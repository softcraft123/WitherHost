name: Build WitherHost APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install web dependencies
        run: |
          npm install --legacy-peer-deps \
            "next@^14.2.0" \
            "react@^18.3.0" \
            "react-dom@^18.3.0" \
            "firebase@^10.7.0" \
            "tailwindcss@^3.4.0" \
            "autoprefixer@^10.4.16" \
            "postcss@^8.4.31" \
            "@radix-ui/react-dialog@^1.1.1" \
            "@radix-ui/react-dropdown-menu@^2.0.5" \
            "@radix-ui/react-alert-dialog@^1.0.5" \
            "class-variance-authority@^0.7.0" \
            "clsx@^2.0.0" \
            "lucide-react@^0.294.0" \
            "@capacitor/cli@^5.7.0" \
            "@capacitor/core@^5.7.0" \
            "@capacitor/android@^5.7.0" \
            "@capacitor/app@^5.0.0" \
            "@capacitor/status-bar@^5.0.0" \
            "@capacitor/keyboard@^5.0.0"

      - name: Build Next.js static export
        run: npx next build
        env:
          NODE_ENV: production

      - name: Sync Capacitor (copy web assets to Android)
        run: npx cap copy android

      - name: Generate app icons
        run: |
          sudo apt-get install -y imagemagick 2>/dev/null || true
          # Create icon directories
          declare -A sizes=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )
          for dir in "${!sizes[@]}"; do
            size="${sizes[$dir]}"
            mkdir -p "android/app/src/main/res/$dir"
            # Create a green circle icon (Minecraft/WitherHost themed)
            convert -size ${size}x${size} xc:"#1a1a2e" \
              -fill "#2d9e6b" -draw "circle $((size/2)),$((size/2)) $((size/2)),$((size/4))" \
              -fill white -pointsize $((size/4)) -gravity center -annotate 0 "W" \
              "android/app/src/main/res/$dir/ic_launcher.png" 2>/dev/null || \
            python3 -c "
          import struct, zlib
          size = $size
          def create_png(width, height, r, g, b):
              def write_chunk(type_bytes, data):
                  c = zlib.crc32(type_bytes + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + type_bytes + data + struct.pack('>I', c)
              header = b'\x89PNG\r\n\x1a\n'
              ihdr = write_chunk(b'IHDR', struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0))
              raw = b''
              for y in range(height):
                  row = b'\x00'
                  for x in range(width):
                      cx, cy = x - width//2, y - height//2
                      if cx*cx + cy*cy < (width//2 - 4)**2:
                          row += bytes([r, g, b])
                      else:
                          row += bytes([26, 26, 46])
                  raw += row
              idat = write_chunk(b'IDAT', zlib.compress(raw))
              iend = write_chunk(b'IEND', b'')
              return header + ihdr + idat + iend
          with open('android/app/src/main/res/$dir/ic_launcher.png', 'wb') as f:
              f.write(create_png(size, size, 45, 158, 107))
          "
            cp "android/app/src/main/res/$dir/ic_launcher.png" \
               "android/app/src/main/res/$dir/ic_launcher_round.png"
          done
          echo "Icons generated successfully"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-8.1.1-wrapper.jar" \
            || \
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar"
          ls -lh android/gradle/wrapper/
          chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WitherHost-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show success
        run: |
          echo "=============================="
          echo "  APK BUILT SUCCESSFULLY!"
          echo "=============================="
          ls -lh android/app/build/outputs/apk/debug/ || echo "Check artifacts section above"
          echo ""
          echo "Download the APK from the Artifacts section!"
